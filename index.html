<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📺 電視提醒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a1a;
    --text: #f0f0f0;
    --accent: #fbbf24;
    --accent-glow: rgba(251, 191, 36, 0.3);
    --muted: rgba(255,255,255,0.12);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Microsoft JhengHei', 'Segoe UI', 'Noto Sans TC', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    user-select: none;
    cursor: none;
  }
  .clock-area { position: fixed; top: 3vh; width: 100%; text-align: center; }
  .clock-time { font-size: 5vw; font-weight: 300; color: rgba(255,255,255,0.25); font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }
  .clock-date { font-size: 1.8vw; color: rgba(255,255,255,0.15); margin-top: 0.5vh; }
  .message-area { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 8vw; min-height: 40vh; }
  .message-text { font-size: 10vw; font-weight: 700; line-height: 1.3; color: var(--text); text-shadow: 0 0 40px var(--accent-glow), 0 0 80px var(--accent-glow); opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  .message-text.visible { opacity: 1; transform: translateY(0); }
  .message-text.exit { opacity: 0; transform: translateY(-20px); }
  .idle-screen { display: flex; flex-direction: column; align-items: center; gap: 3vh; }
  .idle-heart { font-size: 8vw; animation: pulse 3s ease-in-out infinite; }
  .idle-text { font-size: 4vw; color: rgba(255,255,255,0.3); font-weight: 300; }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.08); opacity: 1; } }
  .dots { position: fixed; bottom: 4vh; display: flex; gap: 1.2vw; justify-content: center; }
  .dot { width: 1vw; height: 1vw; border-radius: 50%; background: var(--muted); transition: all 0.4s; }
  .dot.active { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); transform: scale(1.3); }
  .status-bar { position: fixed; bottom: 1.5vh; right: 2vw; font-size: 1vw; color: rgba(255,255,255,0.08); }
  .status-dot { display: inline-block; width: 0.6vw; height: 0.6vw; border-radius: 50%; background: #22c55e; margin-right: 0.4vw; animation: blink 3s infinite; }
  @keyframes blink { 0%, 90%, 100% { opacity: 1; } 95% { opacity: 0.3; } }
  .setup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; justify-content: center; align-items: center; cursor: default; }
  .setup-overlay.visible { display: flex; }
  .setup-box { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; width: min(650px, 92vw); max-height: 88vh; overflow-y: auto; }
  .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
  .setup-grid .full { grid-column: 1 / -1; }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .color-swatch { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); }
  .setup-box select { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-size: 14px; outline: none; cursor: pointer; }
  .setup-box select option { background: #1a1a2e; }
  input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; outline: none; margin-top: 6px; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; cursor: pointer; }
  .setup-box h2 { color: var(--accent); margin-bottom: 20px; font-size: 20px; }
  .setup-box label { display: block; color: #888; font-size: 13px; margin-top: 16px; margin-bottom: 6px; }
  .setup-box input[type="text"] { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
  .setup-box input:focus { border-color: var(--accent); }
  .setup-box .hint { color: #555; font-size: 11px; margin-top: 4px; }
  .setup-btn { display: inline-block; margin-top: 24px; padding: 10px 28px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .setup-btn:hover { opacity: 0.9; }
  .setup-status { margin-top: 12px; color: #22c55e; font-size: 13px; min-height: 20px; }
</style>
</head>
<body>
<div class="clock-area">
  <div class="clock-time" id="clockTime">--:--:--</div>
  <div class="clock-date" id="clockDate"></div>
</div>
<div class="message-area" id="messageArea">
  <div class="idle-screen" id="idleScreen">
    <div class="idle-heart">❤️</div>
    <div class="idle-text">一切安好</div>
  </div>
  <div class="message-text" id="messageText"></div>
</div>
<div class="dots" id="dots"></div>
<div class="status-bar">
  <span class="status-dot"></span>
  <span id="statusText">連線中...</span>
</div>
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>⚙️ 設定面板 <span style="font-size:12px;color:#555;font-weight:normal;margin-left:8px">按 ESC 關閉</span></h2>
    <div class="setup-grid">
      <div class="full">
        <label>Google Sheet CSV 網址</label>
        <input type="text" id="csvUrlInput" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv" />
        <div class="hint">Google Sheets → 檔案 → 共用 → 發布到網路 → CSV 格式</div>
      </div>
      <div>
        <label>更新頻率：<span id="intervalVal">30</span> 秒</label>
        <input type="range" id="intervalInput" min="10" max="120" value="30" step="5" />
        <div class="hint">多久抓一次 Google Sheet</div>
      </div>
      <div>
        <label>訊息停留：<span id="displayVal">8</span> 秒</label>
        <input type="range" id="displayInput" min="3" max="30" value="8" step="1" />
        <div class="hint">多則訊息時每則顯示多久</div>
      </div>
      <div class="full">
        <label>文字大小：<span id="sizeVal">10</span>vw</label>
        <input type="range" id="sizeInput" min="4" max="18" value="10" step="0.5" />
        <div class="hint">拉大一點老人看更清楚，拉小可以顯示更多字</div>
      </div>
      <div class="full">
        <label>字型樣式</label>
        <select id="fontSelect">
          <option value="'Microsoft JhengHei', 'Noto Sans TC', sans-serif">微軟正黑（預設）</option>
          <option value="'Noto Sans TC', sans-serif">Noto Sans 思源黑體</option>
          <option value="'Noto Serif TC', serif">Noto Serif 思源宋體</option>
          <option value="'Arial Rounded MT Bold', 'Microsoft JhengHei', sans-serif">圓體 Rounded</option>
          <option value="'Segoe UI', sans-serif">Segoe UI</option>
          <option value="'Georgia', serif">Georgia 襯線體</option>
        </select>
      </div>
      <div>
        <label>文字粗細</label>
        <select id="weightSelect">
          <option value="400">一般 Regular</option>
          <option value="600">半粗 Semi-Bold</option>
          <option value="700" selected>粗體 Bold（預設）</option>
          <option value="900">超粗 Black</option>
        </select>
      </div>
      <div>
        <label>文字顏色</label>
        <div class="color-row" id="textColorRow">
          <div class="color-swatch active" data-color="#f0f0f0" style="background:#f0f0f0" title="白色"></div>
          <div class="color-swatch" data-color="#fbbf24" style="background:#fbbf24" title="金色"></div>
          <div class="color-swatch" data-color="#f43f5e" style="background:#f43f5e" title="紅色"></div>
          <div class="color-swatch" data-color="#10b981" style="background:#10b981" title="綠色"></div>
          <div class="color-swatch" data-color="#3b82f6" style="background:#3b82f6" title="藍色"></div>
          <div class="color-swatch" data-color="#a78bfa" style="background:#a78bfa" title="紫色"></div>
          <div class="color-swatch" data-color="#fb923c" style="background:#fb923c" title="橘色"></div>
        </div>
      </div>
      <div class="full">
        <label>背景顏色</label>
        <div class="color-row" id="bgColorRow">
          <div class="color-swatch active" data-color="#0a0a1a" style="background:#0a0a1a;border:1px solid #444" title="深黑"></div>
          <div class="color-swatch" data-color="#1a1a2e" style="background:#1a1a2e" title="深藍"></div>
          <div class="color-swatch" data-color="#0f172a" style="background:#0f172a" title="海軍藍"></div>
          <div class="color-swatch" data-color="#1c1917" style="background:#1c1917" title="深棕"></div>
          <div class="color-swatch" data-color="#14532d" style="background:#14532d" title="深綠"></div>
          <div class="color-swatch" data-color="#450a0a" style="background:#450a0a" title="深紅"></div>
          <div class="color-swatch" data-color="#ffffff" style="background:#ffffff" title="白色"></div>
        </div>
      </div>
    </div>
    <button class="setup-btn" id="saveBtn">💾 儲存設定</button>
    <div class="setup-status" id="setupStatus"></div>
  </div>
</div>
<script>
const CONFIG_KEY = 'tv-reminder-config';
const DEFAULTS = { csvUrl: '', fetchInterval: 30, displayTime: 8, fontSize: 10, fontFamily: "'Microsoft JhengHei', 'Noto Sans TC', sans-serif", fontWeight: 700, textColor: '#f0f0f0', bgColor: '#0a0a1a' };
let config = loadConfig();
function loadConfig() { try { const s = localStorage.getItem(CONFIG_KEY); if (s) return { ...DEFAULTS, ...JSON.parse(s) }; } catch(e) {} return { ...DEFAULTS }; }
function saveConfig(c) { config = c; localStorage.setItem(CONFIG_KEY, JSON.stringify(c)); }
function applyVisualConfig() {
  const root = document.documentElement;
  root.style.setProperty('--bg', config.bgColor);
  root.style.setProperty('--text', config.textColor);
  const r = parseInt(config.textColor.slice(1,3),16), g = parseInt(config.textColor.slice(3,5),16), b = parseInt(config.textColor.slice(5,7),16);
  root.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.3)`);
  const m = document.getElementById('messageText');
  m.style.fontSize = config.fontSize + 'vw';
  m.style.fontFamily = config.fontFamily;
  m.style.fontWeight = config.fontWeight;
}
let messages = [], currentIndex = 0, fetchTimer = null, rotateTimer = null;
const clockTime = document.getElementById('clockTime'), clockDate = document.getElementById('clockDate');
const idleScreen = document.getElementById('idleScreen'), messageText = document.getElementById('messageText');
const dots = document.getElementById('dots'), statusText = document.getElementById('statusText');
const setupOverlay = document.getElementById('setupOverlay');
function updateClock() {
  const now = new Date();
  clockTime.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
  const wd = ['日','一','二','三','四','五','六'];
  clockDate.textContent = `${now.getMonth()+1} 月 ${now.getDate()} 日　星期${wd[now.getDay()]}`;
}
updateClock(); setInterval(updateClock, 1000);
async function fetchMessages() {
  if (!config.csvUrl) return;
  try {
    const url = config.csvUrl + (config.csvUrl.includes('?') ? '&' : '?') + '_t=' + Date.now();
    const resp = await fetch(url);
    const text = await resp.text();
    const lines = text.trim().split('\n');
    const nm = [];
    for (let i = 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      const p = parseCSVLine(lines[i]);
      const msg = (p[0]||'').trim(), show = (p[1]||'').trim().toUpperCase();
      if (msg && show === 'Y') nm.push(msg);
    }
    messages = nm;
    statusText.textContent = `已連線 · ${messages.length} 則提醒`;
    updateDisplay();
  } catch (e) { statusText.textContent = '⚠ 連線失敗，稍後重試...'; }
}
function parseCSVLine(line) {
  const r = []; let c = '', q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (q) { if (ch === '"' && line[i+1] === '"') { c += '"'; i++; } else if (ch === '"') q = false; else c += ch; }
    else { if (ch === '"') q = true; else if (ch === ',') { r.push(c); c = ''; } else c += ch; }
  }
  r.push(c); return r;
}
function updateDisplay() { renderDots(); if (messages.length === 0) showIdle(); else showMessage(currentIndex % messages.length); }
function showIdle() { messageText.classList.remove('visible'); messageText.classList.add('exit'); idleScreen.style.display = 'flex'; if (rotateTimer) clearInterval(rotateTimer); rotateTimer = null; }
function showMessage(idx) {
  idleScreen.style.display = 'none';
  messageText.classList.remove('visible'); messageText.classList.add('exit');
  setTimeout(() => { messageText.textContent = messages[idx]; messageText.classList.remove('exit'); messageText.classList.add('visible'); highlightDot(idx); }, 400);
  if (!rotateTimer && messages.length > 1) { rotateTimer = setInterval(() => { currentIndex = (currentIndex + 1) % messages.length; showMessage(currentIndex); }, config.displayTime * 1000); }
}
function renderDots() { dots.innerHTML = ''; if (messages.length <= 1) return; for (let i = 0; i < messages.length; i++) { const d = document.createElement('div'); d.className = 'dot' + (i === currentIndex % messages.length ? ' active' : ''); dots.appendChild(d); } }
function highlightDot(idx) { dots.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx)); }
// Setup panel
document.getElementById('intervalInput').addEventListener('input', e => { document.getElementById('intervalVal').textContent = e.target.value; });
document.getElementById('displayInput').addEventListener('input', e => { document.getElementById('displayVal').textContent = e.target.value; });
document.getElementById('sizeInput').addEventListener('input', e => { document.getElementById('sizeVal').textContent = e.target.value; document.getElementById('messageText').style.fontSize = e.target.value + 'vw'; });
function setupColorSwatches(cid, cb) { const ct = document.getElementById(cid); ct.addEventListener('click', e => { const s = e.target.closest('.color-swatch'); if (!s) return; ct.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active')); s.classList.add('active'); cb(s.dataset.color); }); }
setupColorSwatches('textColorRow', c => { document.documentElement.style.setProperty('--text', c); const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16); document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.3)`); });
setupColorSwatches('bgColorRow', c => { document.documentElement.style.setProperty('--bg', c); });
document.getElementById('fontSelect').addEventListener('change', e => { document.getElementById('messageText').style.fontFamily = e.target.value; });
document.getElementById('weightSelect').addEventListener('change', e => { document.getElementById('messageText').style.fontWeight = e.target.value; });
function populateSetupPanel() {
  document.getElementById('csvUrlInput').value = config.csvUrl || '';
  document.getElementById('intervalInput').value = config.fetchInterval; document.getElementById('intervalVal').textContent = config.fetchInterval;
  document.getElementById('displayInput').value = config.displayTime; document.getElementById('displayVal').textContent = config.displayTime;
  document.getElementById('sizeInput').value = config.fontSize; document.getElementById('sizeVal').textContent = config.fontSize;
  document.getElementById('fontSelect').value = config.fontFamily;
  document.getElementById('weightSelect').value = config.fontWeight;
  document.querySelectorAll('#textColorRow .color-swatch').forEach(s => s.classList.toggle('active', s.dataset.color === config.textColor));
  document.querySelectorAll('#bgColorRow .color-swatch').forEach(s => s.classList.toggle('active', s.dataset.color === config.bgColor));
}
document.addEventListener('keydown', e => {
  if ((e.key === 's' || e.key === 'S') && document.activeElement.tagName !== 'INPUT') { setupOverlay.classList.toggle('visible'); if (setupOverlay.classList.contains('visible')) populateSetupPanel(); }
  if (e.key === 'Escape') setupOverlay.classList.remove('visible');
});
document.getElementById('saveBtn').addEventListener('click', () => {
  const tc = document.querySelector('#textColorRow .color-swatch.active'), bc = document.querySelector('#bgColorRow .color-swatch.active');
  saveConfig({ csvUrl: document.getElementById('csvUrlInput').value.trim(), fetchInterval: parseInt(document.getElementById('intervalInput').value)||30, displayTime: parseInt(document.getElementById('displayInput').value)||8, fontSize: parseFloat(document.getElementById('sizeInput').value)||10, fontFamily: document.getElementById('fontSelect').value, fontWeight: parseInt(document.getElementById('weightSelect').value)||700, textColor: tc ? tc.dataset.color : '#f0f0f0', bgColor: bc ? bc.dataset.color : '#0a0a1a' });
  applyVisualConfig();
  document.getElementById('setupStatus').textContent = '✅ 已儲存！';
  startSystem();
  setTimeout(() => setupOverlay.classList.remove('visible'), 1200);
});
function startSystem() {
  if (fetchTimer) clearInterval(fetchTimer); if (rotateTimer) clearInterval(rotateTimer);
  rotateTimer = null; currentIndex = 0;
  if (!config.csvUrl) { statusText.textContent = '按 S 鍵設定 Google Sheet 網址'; showIdle(); return; }
  fetchMessages(); fetchTimer = setInterval(fetchMessages, config.fetchInterval * 1000);
}
applyVisualConfig(); startSystem();
if (!config.csvUrl) setTimeout(() => setupOverlay.classList.add('visible'), 1000);
</script>
</body>
</html>
