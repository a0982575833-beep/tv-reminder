<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📺 電視提醒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a1a;
    --text: #f0f0f0;
    --accent: #fbbf24;
    --accent-glow: rgba(251, 191, 36, 0.3);
    --muted: rgba(255,255,255,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Microsoft JhengHei', 'Segoe UI', 'Noto Sans TC', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    user-select: none;
    cursor: none;
  }

  .clock-area {
    position: fixed;
    top: 3vh;
    width: 100%;
    text-align: center;
  }
  .clock-time {
    font-size: 5vw;
    font-weight: 300;
    color: rgba(255,255,255,0.25);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
  }
  .clock-date {
    font-size: 1.8vw;
    color: rgba(255,255,255,0.15);
    margin-top: 0.5vh;
  }

  .message-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 8vw;
    min-height: 40vh;
  }

  .message-text {
    font-size: 10vw;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    text-shadow: 0 0 40px var(--accent-glow), 0 0 80px var(--accent-glow);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .message-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .message-text.exit {
    opacity: 0;
    transform: translateY(-20px);
  }

  .idle-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3vh;
  }

  .idle-heart {
    font-size: 8vw;
    animation: pulse 3s ease-in-out infinite;
  }

  .idle-text {
    font-size: 4vw;
    color: rgba(255,255,255,0.3);
    font-weight: 300;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.08); opacity: 1; }
  }

  .dots {
    position: fixed;
    bottom: 4vh;
    display: flex;
    gap: 1.2vw;
    justify-content: center;
  }

  .dot {
    width: 1vw;
    height: 1vw;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.4s;
  }

  .dot.active {
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
    transform: scale(1.3);
  }

  .status-bar {
    position: fixed;
    bottom: 1.5vh;
    right: 2vw;
    font-size: 1vw;
    color: rgba(255,255,255,0.08);
  }

  .status-dot {
    display: inline-block;
    width: 0.6vw;
    height: 0.6vw;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 0.4vw;
    animation: blink 3s infinite;
  }

  @keyframes blink {
    0%, 90%, 100% { opacity: 1; }
    95% { opacity: 0.3; }
  }

  .setup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    justify-content: center;
    align-items: center;
    cursor: default;
  }
  .setup-overlay.visible { display: flex; }

  .setup-box {
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 40px;
    width: min(550px, 90vw);
  }

  .setup-box h2 {
    color: var(--accent);
    margin-bottom: 20px;
    font-size: 20px;
  }

  .setup-box label {
    display: block;
    color: #888;
    font-size: 13px;
    margin-top: 16px;
    margin-bottom: 6px;
  }

  .setup-box input {
    width: 100%;
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    outline: none;
  }
  .setup-box input:focus { border-color: var(--accent); }

  .setup-box .hint {
    color: #555;
    font-size: 11px;
    margin-top: 4px;
  }

  .setup-btn {
    display: inline-block;
    margin-top: 24px;
    padding: 10px 28px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .setup-btn:hover { opacity: 0.9; }

  .setup-status {
    margin-top: 12px;
    color: #22c55e;
    font-size: 13px;
    min-height: 20px;
  }
</style>
</head>
<body>

<div class="clock-area">
  <div class="clock-time" id="clockTime">--:--:--</div>
  <div class="clock-date" id="clockDate"></div>
</div>

<div class="message-area" id="messageArea">
  <div class="idle-screen" id="idleScreen">
    <div class="idle-heart">❤️</div>
    <div class="idle-text">一切安好</div>
  </div>
  <div class="message-text" id="messageText"></div>
</div>

<div class="dots" id="dots"></div>

<div class="status-bar">
  <span class="status-dot"></span>
  <span id="statusText">連線中...</span>
</div>

<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>⚙️ 初始設定</h2>
    <label>Google Sheet CSV 網址</label>
    <input type="text" id="csvUrlInput" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv" />
    <div class="hint">
      Google Sheets → 檔案 → 共用 → 發布到網路 → CSV 格式 → 複製網址貼這裡
    </div>

    <label>更新頻率（秒）</label>
    <input type="number" id="intervalInput" value="30" min="10" max="300" />
    <div class="hint">建議 30 秒，最快 10 秒</div>

    <label>每則訊息顯示時間（秒）</label>
    <input type="number" id="displayInput" value="8" min="3" max="30" />

    <button class="setup-btn" id="saveBtn">💾 儲存並啟動</button>
    <div class="setup-status" id="setupStatus"></div>
  </div>
</div>

<script>
const CONFIG_KEY = 'tv-reminder-config';
let config = loadConfig();

function loadConfig() {
  try {
    const saved = localStorage.getItem(CONFIG_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return { csvUrl: '', fetchInterval: 30, displayTime: 8 };
}

function saveConfig(cfg) {
  config = cfg;
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
}

let messages = [];
let currentIndex = 0;
let fetchTimer = null;
let rotateTimer = null;

const clockTime = document.getElementById('clockTime');
const clockDate = document.getElementById('clockDate');
const idleScreen = document.getElementById('idleScreen');
const messageText = document.getElementById('messageText');
const dots = document.getElementById('dots');
const statusText = document.getElementById('statusText');
const setupOverlay = document.getElementById('setupOverlay');

function updateClock() {
  const now = new Date();
  clockTime.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  const m = now.getMonth() + 1;
  const d = now.getDate();
  const w = weekdays[now.getDay()];
  clockDate.textContent = `${m} 月 ${d} 日　星期${w}`;
}
updateClock();
setInterval(updateClock, 1000);

async function fetchMessages() {
  if (!config.csvUrl) return;
  try {
    const url = config.csvUrl + (config.csvUrl.includes('?') ? '&' : '?') + '_t=' + Date.now();
    const response = await fetch(url);
    const text = await response.text();
    const lines = text.trim().split('\n');
    const newMessages = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      if (!line.trim()) continue;
      const parts = parseCSVLine(line);
      const msg = (parts[0] || '').trim();
      const show = (parts[1] || '').trim().toUpperCase();
      if (msg && show === 'Y') newMessages.push(msg);
    }
    messages = newMessages;
    statusText.textContent = `已連線 · ${messages.length} 則提醒`;
    updateDisplay();
  } catch (err) {
    console.error('Fetch error:', err);
    statusText.textContent = '⚠ 連線失敗，稍後重試...';
  }
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuote) {
      if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') inQuote = false;
      else current += ch;
    } else {
      if (ch === '"') inQuote = true;
      else if (ch === ',') { result.push(current); current = ''; }
      else current += ch;
    }
  }
  result.push(current);
  return result;
}

function updateDisplay() {
  renderDots();
  if (messages.length === 0) showIdle();
  else showMessage(currentIndex % messages.length);
}

function showIdle() {
  messageText.classList.remove('visible');
  messageText.classList.add('exit');
  idleScreen.style.display = 'flex';
  if (rotateTimer) clearInterval(rotateTimer);
  rotateTimer = null;
}

function showMessage(index) {
  idleScreen.style.display = 'none';
  messageText.classList.remove('visible');
  messageText.classList.add('exit');
  setTimeout(() => {
    messageText.textContent = messages[index];
    messageText.classList.remove('exit');
    messageText.classList.add('visible');
    highlightDot(index);
  }, 400);
  if (!rotateTimer && messages.length > 1) {
    rotateTimer = setInterval(() => {
      currentIndex = (currentIndex + 1) % messages.length;
      showMessage(currentIndex);
    }, config.displayTime * 1000);
  }
}

function renderDots() {
  dots.innerHTML = '';
  if (messages.length <= 1) return;
  for (let i = 0; i < messages.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentIndex % messages.length ? ' active' : '');
    dots.appendChild(dot);
  }
}

function highlightDot(index) {
  const allDots = dots.querySelectorAll('.dot');
  allDots.forEach((d, i) => d.classList.toggle('active', i === index));
}

document.addEventListener('keydown', (e) => {
  if (e.key === 's' || e.key === 'S') {
    setupOverlay.classList.toggle('visible');
    if (setupOverlay.classList.contains('visible')) {
      document.getElementById('csvUrlInput').value = config.csvUrl || '';
      document.getElementById('intervalInput').value = config.fetchInterval;
      document.getElementById('displayInput').value = config.displayTime;
    }
  }
  if (e.key === 'Escape') setupOverlay.classList.remove('visible');
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const csvUrl = document.getElementById('csvUrlInput').value.trim();
  const interval = parseInt(document.getElementById('intervalInput').value) || 30;
  const display = parseInt(document.getElementById('displayInput').value) || 8;
  saveConfig({ csvUrl, fetchInterval: interval, displayTime: display });
  document.getElementById('setupStatus').textContent = '✅ 已儲存！開始抓取資料...';
  startSystem();
  setTimeout(() => setupOverlay.classList.remove('visible'), 1500);
});

function startSystem() {
  if (fetchTimer) clearInterval(fetchTimer);
  if (rotateTimer) clearInterval(rotateTimer);
  rotateTimer = null;
  currentIndex = 0;
  if (!config.csvUrl) {
    statusText.textContent = '按 S 鍵設定 Google Sheet 網址';
    showIdle();
    return;
  }
  fetchMessages();
  fetchTimer = setInterval(fetchMessages, config.fetchInterval * 1000);
}

startSystem();
if (!config.csvUrl) setTimeout(() => setupOverlay.classList.add('visible'), 1000);
</script>
</body>
</html>
